<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Application</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="chat-container">
        <header class="chat-header">
            <h1>AI Chat Assistant</h1>
            <button id="clearBtn" class="clear-btn" title="Clear chat history">Clear History</button>
        </header>

        <div class="chat-messages" id="chatMessages">
            <div class="welcome-message">
                <h2>Welcome to AI Chat</h2>
                <p>Start a conversation with the AI assistant. Your chat history will be saved automatically.</p>
            </div>
        </div>

        <div class="chat-input-area">
            <div class="input-wrapper">
                <input
                    type="text"
                    id="messageInput"
                    class="message-input"
                    placeholder="Type your message here..."
                    autocomplete="off"
                />
                <button id="sendBtn" class="send-btn">Send</button>
            </div>
            <div id="loadingIndicator" class="loading-indicator">
                <span class="typing-indicator">
                    <span></span>
                    <span></span>
                    <span></span>
                </span>
                <span class="typing-text">AI is typing...</span>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
